spring:
  datasource:
    hikari:
      leak-detection-threshold: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  quartz:
    # In-memory job store for tests. The PostgreSQL JDBC delegate is gated to the non-test
    # profile in application.yml, so RAMJobStore does not receive it here.
    job-store-type: memory
    properties:
      org.quartz.threadPool.threadCount: 1

meridian:
  jwt:
    access-secret: test-access-secret-minimum-256-bits-long-for-hmac-sha
    access-expiry-ms: 900000
    refresh-secret: test-refresh-secret-minimum-256-bits-long-for-hmac-sha
    refresh-expiry-ms: 604800000
  encryption:
    key: test-encryption-key-must-be-32b!

logging:
  level:
    root: WARN
    com.meridian: INFO
