<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" [opened]="isMenuVisible" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/sessions" routerLinkActive="active-link" *ngIf="isStudent()">
        <mat-icon matListItemIcon>fitness_center</mat-icon>
        <span matListItemTitle>My Sessions</span>
      </a>
      <a mat-list-item routerLink="/analytics" routerLinkActive="active-link" *ngIf="isMentorOrAdmin()">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span matListItemTitle>Analytics</span>
      </a>
      <a mat-list-item routerLink="/reports" routerLinkActive="active-link" *ngIf="isMentorOrAdmin()">
        <mat-icon matListItemIcon>description</mat-icon>
        <span matListItemTitle>Reports</span>
      </a>
      <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link" *ngIf="isAdmin()">
        <mat-icon matListItemIcon>manage_accounts</mat-icon>
        <span matListItemTitle>User Management</span>
      </a>
      <a mat-list-item routerLink="/admin/backup" routerLinkActive="active-link" *ngIf="isAdmin()">
        <mat-icon matListItemIcon>backup</mat-icon>
        <span matListItemTitle>Backup &amp; DR</span>
      </a>
      <a mat-list-item routerLink="/governance" routerLinkActive="active-link" *ngIf="isAdmin()">
        <mat-icon matListItemIcon>policy</mat-icon>
        <span matListItemTitle>Governance</span>
      </a>
      <mat-divider></mat-divider>
      <button mat-list-item (click)="logout()" class="logout-btn">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Logout</span>
      </button>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" *ngIf="isMenuVisible" aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">Meridian Training Analytics</span>
      <span class="toolbar-spacer"></span>
      <span class="toolbar-user" *ngIf="currentUser$ | async as user">
        <mat-icon>account_circle</mat-icon>
        {{ user.username }}
      </span>
    </mat-toolbar>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
