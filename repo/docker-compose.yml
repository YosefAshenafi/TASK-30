services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: meridian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meridian"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    # Backend is an internal service reached through the frontend reverse proxy.
    # It listens on 3000 inside the container; the only host-published app port is the frontend's 3000.
    expose:
      - "3000"
    environment:
      # Credentials are supplied separately via spring.datasource username/password.
      # The PostgreSQL JDBC driver does not accept user:password@host in the URL.
      DATABASE_URL: postgresql://db:5432/meridian
      SERVER_PORT: "3000"
      SSL_ENABLED: "false"
      # Fixed local-dev secrets so issued JWTs (and encrypted fields) survive container
      # restarts/rebuilds — otherwise the entrypoint generates random secrets each boot,
      # silently invalidating every previously-issued token. >=64 chars keeps HS512.
      JWT_ACCESS_SECRET: "meridian-local-access-secret-0123456789-abcdefghijklmnopqrstuvwxyz-ACCESS"
      JWT_REFRESH_SECRET: "meridian-local-refresh-secret-0123456789-abcdefghijklmnopqrstuvwxyz-REFRESH"
      ENCRYPTION_KEY: "meridian-local-encryption-key-0123456789-abcdef"
    volumes:
      - backup_data:/var/meridian/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Backend test runner (profile: test). The runtime `backend` image is a slim JRE without
  # Maven, so unit/API tests run from the Maven `build` stage instead. The tests use
  # Testcontainers to start their own PostgreSQL via the host Docker daemon, so the socket is
  # mounted; TESTCONTAINERS_HOST_OVERRIDE rewrites the spawned container's JDBC URL to
  # host.docker.internal so it is reachable from inside this container (host-gateway maps it on
  # plain Linux too). No dependency on the `db` service — Testcontainers manages its own DB.
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      TESTCONTAINERS_RYUK_DISABLED: "true"
    command: ["mvn", "test"]
    profiles:
      - test

  # Frontend test runner (profile: test). The runtime `frontend` image is Nginx (no Node or
  # browser), so Karma/Jasmine unit tests run from the dedicated `test` build stage, which adds
  # headless Chromium on top of the build stage (sources + installed node_modules).
  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: test
    command: ["npm", "test"]
    profiles:
      - test

  playwright:
    image: mcr.microsoft.com/playwright:v1.40.0-focal
    working_dir: /tests
    volumes:
      - ./tests:/tests
      # Anonymous volume so `npm install` writes node_modules inside the container and does not
      # pollute the host ./tests directory (the bind mount above would otherwise receive it).
      - /tests/node_modules
    depends_on:
      - frontend
      - backend
    environment:
      BASE_URL: http://frontend:3000
      # CI=1 makes npm/npx/Playwright fully non-interactive (no "Ok to proceed?" prompts),
      # so the suite runs unattended on a server/CI.
      CI: "1"
    # @playwright/test is pinned to 1.40.0 in tests/package.json to match the browsers bundled
    # in this image. The Playwright config lives in tests/e2e/; its testDir resolves relative to
    # the config file, so the specs in tests/e2e/ are picked up.
    # `npx --yes` auto-confirms any package-install prompt so nothing blocks waiting for input.
    command: >
      bash -lc "npm install --no-audit --no-fund --no-progress --silent &&
                npx --yes playwright install chromium &&
                npx --yes playwright test --config=e2e/playwright.config.ts --reporter=line"
    profiles:
      - e2e

volumes:
  pg_data:
  backup_data:
