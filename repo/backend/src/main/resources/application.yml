server:
  port: ${SERVER_PORT:3000}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:changeit}
    key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:meridian}

spring:
  datasource:
    url: jdbc:${DATABASE_URL:postgresql://localhost:5432/meridian}
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.threadPool.threadCount: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  config: classpath:logback-spring.xml

meridian:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-must-be-overridden-in-production}
    access-expiry-ms: 900000
    refresh-secret: ${JWT_REFRESH_SECRET:dev-refresh-secret-must-be-overridden-in-production}
    refresh-expiry-ms: 604800000
  encryption:
    key: ${ENCRYPTION_KEY:dev-encryption-key-must-be-32bytes!!}
  backup:
    path: ${BACKUP_PATH:/var/meridian/backups}
    retention-days: 30
  sync:
    batch-size: 500
  rate-limit:
    export-per-10min: 20
