version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: meridian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meridian"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/meridian
    volumes:
      - backup_data:/var/meridian/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "4200:80"

  playwright:
    image: mcr.microsoft.com/playwright:v1.40.0-focal
    working_dir: /tests
    volumes:
      - ./tests:/tests
      - ./frontend/package.json:/tests/package.json
    depends_on:
      - frontend
      - backend
    environment:
      BASE_URL: http://frontend
    command: >
      bash -c "npm install && npx playwright install && npx playwright test"
    profiles:
      - e2e

volumes:
  pg_data:
  backup_data:
